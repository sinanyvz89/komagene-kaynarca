<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komagene Kaynarca — Sipariş</title>
<style>
  :root{ --pink1:#E8456A; --pink2:#DE3360; --green:#1FA855; --orange:#F47B20; --ink:#1A1A1A; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(160deg,var(--pink1),var(--pink2));
    color:#fff; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{width:100%; max-width:420px; text-align:center;}
  .logo{font-family:Georgia,"Times New Roman",serif; font-style:italic; font-weight:700; font-size:42px; letter-spacing:-1px; margin-bottom:4px;}
  .loc{font-weight:900; font-size:22px; letter-spacing:3px; opacity:.95; margin-bottom:22px;}
  .deal{background:#fff; border-radius:22px; padding:16px 14px; margin:0 auto 24px; max-width:300px; box-shadow:0 10px 30px rgba(0,0,0,.18);}
  .deal .big{color:var(--orange); font-weight:900; font-size:42px; line-height:1;}
  .deal .sub{color:var(--orange); font-weight:800; font-size:14px; letter-spacing:2px; margin-top:4px;}
  .deal .when{color:var(--ink); font-weight:700; font-size:13px; margin-top:8px;}
  h1{font-size:19px; font-weight:800; margin-bottom:16px; opacity:.95;}
  .btn{display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:17px; border-radius:16px;
    font-size:18px; font-weight:800; text-decoration:none; margin-bottom:13px; box-shadow:0 6px 18px rgba(0,0,0,.18); transition:transform .08s ease;}
  .btn:active{transform:scale(.98);}
  .btn svg{width:24px; height:24px; flex:0 0 auto;}
  .btn-app{background:var(--orange); color:#fff;}
  .btn-call{background:#fff; color:var(--pink2);}
  .btn-wa{background:var(--green); color:#fff;}
  .phone{font-weight:900; letter-spacing:1px; margin-top:6px;}
  .foot{font-size:12px; opacity:.8; margin-top:16px;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">komagene</div>
    <div class="loc">KAYNARCA</div>

    <div class="deal">
      <div class="big">+%50</div>
      <div class="sub">BEDAVA ÇİĞ KÖFTE</div>
      <div class="when">Her ayın 15'inde</div>
    </div>

    <h1>Nasıl sipariş vermek istersin?</h1>

    <a id="app-btn" class="btn btn-app" href="https://www.komagene.com.tr/">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10a3 3 0 0 1 3 3v14a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V5a3 3 0 0 1 3-3zm5 17a1.2 1.2 0 1 0 0 2.4A1.2 1.2 0 0 0 12 19zM7 4.5v12h10v-12H7z"/></svg>
      Gene Gelsin Uygulaması
    </a>

    <a class="btn btn-call" href="tel:+905078480454">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.5 21 3 13.5 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"/></svg>
      Hemen Ara
    </a>

    <a class="btn btn-wa" href="https://wa.me/905078480454?text=Merhaba%2C%20sipari%C5%9F%20vermek%20istiyorum">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.4 5 5.1-1.3A10 10 0 1 0 12 2zm5.9 14.1c-.2.7-1.4 1.3-2 1.4-.5.1-1.2.1-1.9-.1-.4-.1-1-.3-1.7-.6-3-1.3-4.9-4.3-5.1-4.5-.1-.2-1.2-1.6-1.2-3s.7-2.1 1-2.4c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5.2.6.8 2 .9 2.1.1.1.1.3 0 .5-.1.2-.1.3-.3.5l-.4.5c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.5.1.6-.1.2-.2.7-.8.9-1.1.2-.3.4-.2.6-.1.2.1 1.5.7 1.8.9.3.1.4.2.5.3.1.2.1.6-.1 1.2z"/></svg>
      WhatsApp'tan Yaz
    </a>

    <div class="phone">0507 848 04 54</div>
    <div class="foot">Komagene Kaynarca · Çiğ Köfte</div>
  </div>

  <script>
    (function(){
      var ua = navigator.userAgent || navigator.vendor || '';
      var el = document.getElementById('app-btn');
      var IOS_URL = 'https://apps.apple.com/tr/app/komagene-gene-gelsin/id1620339548';
      var AND_URL = 'https://play.google.com/store/apps/details?id=com.grows.komagene';
      var WEB_URL = 'https://www.komagene.com.tr/';
      if (/android/i.test(ua)) { el.href = AND_URL; }
      else if (/iphone|ipad|ipod/i.test(ua)) { el.href = IOS_URL; }
      else { el.href = WEB_URL; }
    })();
  </script>
</body>
</html>
